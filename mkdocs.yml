site_name: Risa's All In One Menu
site_description: One launcher hotkey (F1) opens many mod menus and frees each mod's own hotkey for other use.
site_author: Risasre22
site_url: https://risasre22.github.io/Risas-All-In-One-Menu/

repo_name: Risasre22/Risas-All-In-One-Menu
repo_url: https://github.com/Risasre22/Risas-All-In-One-Menu

docs_dir: wiki

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Supported Mods: supported-mods.md
  - Hotkey Allocation: hotkey-allocation.md
  - Uninstall & Restore: uninstall.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Risasre22/Risas-All-In-One-Menu
